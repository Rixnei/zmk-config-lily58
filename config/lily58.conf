# ================================
# Lily58 ZMK Configuration
# ================================

# 🔌 Bluetooth: усиленный сигнал
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 📶 Bluetooth: улучшенная стабильность соединения (станет дефолтом в новых версиях ZMK)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# 💤 Режим сна (включён)
CONFIG_ZMK_SLEEP=y

# ⏲️ Время до "idle" (низкое энергопотребление, но BLE работает)
CONFIG_ZMK_IDLE_TIMEOUT=300000

# 🛌 Время до "deep sleep" (глубокий сон, BLE отключается)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# 🧠 Поддержка энкодера (если используешь его)
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 💡 Поддержка OLED-дисплея (если есть)
# CONFIG_ZMK_DISPLAY=y

# (другие настройки можно добавлять ниже)
